name: pantas_print
description: "A professional Bluetooth thermal ESC/POS printing application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  flutter_bluetooth_serial: ^0.4.0
  esc_pos_utils_plus: ^2.0.3
  image: ^4.2.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  receive_sharing_intent: ^1.6.3
  path: ^1.9.0
  pdfx: ^2.6.0
  app_links: ^6.3.2
  file_picker: ^8.0.3
  google_mlkit_text_recognition: ^0.12.0
  qr_flutter: ^4.1.0
  camera: ^0.11.0+2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  workmanager: ^0.5.2
  flutter_local_notifications: ^17.1.2
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  share_plus: ^10.1.0
  qr_code_scanner: ^1.0.1
  device_info_plus: ^9.1.2
  archive: ^3.6.1
  encrypt: ^5.0.3
  crypto: ^3.0.3

dependency_overrides:
  camera_android_camerax: 0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#1E2A5E"
  image: "assets/images/logo.png"
  android: true
